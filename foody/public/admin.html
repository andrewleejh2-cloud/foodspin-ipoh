<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>审核后台 · Foody</title>
  <link rel="icon" href="img/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#D96A3B">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
</head>
<body class="page-admin">

  <!-- 顶栏 -->
  <header class="adm-top">
    <button class="chip icon-chip" id="backBtn"></button>
    <span class="adm-title" id="admTitle"></span>
    <div class="spacer"></div>
    <button class="chip icon-chip" id="langBtn" title="Language"></button>
  </header>

  <main class="adm-wrap" id="admWrap">
    <section class="adm-stats" id="admStats"></section>
    <div class="adm-view-toggle" id="admViewToggle"></div>
    <div id="admReportView">
      <div class="adm-tabs" id="admTabs"></div>
      <section class="adm-list" id="admList"></section>
    </div>
    <div id="admUsersView" hidden>
      <input id="admUserSearch" class="adm-user-search" type="search" autocomplete="off">
      <section class="adm-list" id="admUserList"></section>
    </div>
  </main>

  <script src="js/shared.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
