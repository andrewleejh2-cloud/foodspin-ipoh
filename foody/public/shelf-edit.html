<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>管理货架 · Foody</title>
  <link rel="icon" href="img/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#D96A3B">
  <link rel="apple-touch-icon" href="/img/icon-192.png">
</head>
<body class="page-profile">

  <header class="pf-top">
    <button class="chip icon-chip" id="backBtn"></button>
    <span class="pf-top-name" data-i18n="shelfEditTitle"></span>
    <div class="spacer"></div>
    <button class="chip" id="viewBtn" data-i18n="shelfView"></button>
  </header>

  <main class="pf-wrap edit-wrap">
    <form id="shelfForm" novalidate>
      <p class="field-hint" data-i18n="siteShelfHint"></p>
      <div id="shelfList"></div>
      <button type="button" class="btn-ghost" id="addGood" data-i18n="siteAddGood"></button>
      <div class="modal-actions">
        <button type="submit" class="btn block" id="saveBtn" data-i18n="save"></button>
      </div>
    </form>
  </main>

  <script src="js/shared.js"></script>
  <script src="js/shelf-edit.js"></script>
</body>
</html>
