<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4E2F20"/>
      <stop offset="1" stop-color="#271511"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".52" r=".55">
      <stop offset="0" stop-color="#C97E3F" stop-opacity=".4"/>
      <stop offset="1" stop-color="#C97E3F" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="720" height="1080" fill="url(#bg)"/>
  <rect width="720" height="1080" fill="url(#glow)"/>

  <!-- 火星 -->
  <g fill="#E8A33C">
    <circle cx="120" cy="180" r="4" opacity=".8"/><circle cx="200" cy="120" r="3" opacity=".5"/>
    <circle cx="560" cy="150" r="4" opacity=".7"/><circle cx="640" cy="230" r="3" opacity=".5"/>
    <circle cx="80" cy="320" r="3" opacity=".4"/><circle cx="660" cy="380" r="3" opacity=".4"/>
    <circle cx="350" cy="90" r="3" opacity=".6"/>
  </g>

  <!-- 烟 -->
  <g stroke="#D9C9B4" stroke-width="13" stroke-linecap="round" fill="none" opacity=".2">
    <path d="M250 240c-30 36 30 56 0 92"/>
    <path d="M450 200c-26 32 26 50 0 82"/>
  </g>

  <!-- 盘子 -->
