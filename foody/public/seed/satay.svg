      <rect x="330" y="308" width="60" height="62" rx="18" fill="#9C5A2C"/>
      <rect x="328" y="378" width="64" height="66" rx="18" fill="#8A4E24"/>
      <rect x="332" y="452" width="58" height="60" rx="17" fill="#9C5A2C"/>
