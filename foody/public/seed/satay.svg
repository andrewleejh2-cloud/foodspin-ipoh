      <path d="M336 330l-6 40M388 396l4 44" stroke="#6F3D1C" stroke-width="7" stroke-linecap="round"/>
      <path d="M352 334l14 6M348 472l16 6" stroke="#C97E3F" stroke-width="6" stroke-linecap="round"/>
    </g>
    <g transform="rotate(-9 360 800)">
