      <rect x="329" y="292" width="62" height="64" rx="18" fill="#8A4E24"/>
      <rect x="331" y="364" width="58" height="62" rx="17" fill="#9C5A2C"/>
      <rect x="328" y="434" width="64" height="64" rx="18" fill="#8A4E24"/>
