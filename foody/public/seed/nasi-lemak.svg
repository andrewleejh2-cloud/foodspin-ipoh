      <stop offset="0" stop-color="#47855F"/>
      <stop offset="1" stop-color="#24503A"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20"/>
